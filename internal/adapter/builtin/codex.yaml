name: OpenAI Codex CLI
detect: codex
launch: codex

context:
  mode: native
  file: ""
skills:
  target: ""
scaffold:
  - .codex/skills
hooks:
  config: ~/.codex/config.toml
  install: ""
  docs: https://developers.openai.com/codex/config-advanced
  notes: one notify program for all events; external notify reliably fires turn-complete (idle)
  events:
    working: ""
    waiting: approval-requested
    idle: agent-turn-complete
run:
  vendor: openai
  default_for: [openai]
  model_flag: "--model"
  effort_flag: "-c"   # codex takes reasoning effort as a config override
  effort_values:
    low: model_reasoning_effort=low
    medium: model_reasoning_effort=medium
    high: model_reasoning_effort=high
