name: OpenAI Codex CLI
detect: codex
launch: codex

context:
  mode: native
  file: ""
skills:
  target: ""
scaffold:
  - .codex/skills
hooks:
  config: ~/.codex/config.toml
  install: ""
  docs: https://developers.openai.com/codex/config-advanced
  notes: one notify program for all events; external notify reliably fires turn-complete (idle)
  events:
    waiting: {event: approval-requested}
    idle: {event: agent-turn-complete}
# Codex's live footer reads `  gpt-5.5 medium · ~/dir` (model, optional
# reasoning effort, then the cwd) and updates on /model, unlike the intro
# header. Capture the model token off that footer.
heuristics:
  model: '(?m)^ {2}(\S+)(?: (?:minimal|low|medium|high|xhigh))? · [~/]'
run:
  vendor: openai
  default_for: [openai]
  model_flag: "--model"
  effort_flag: "-c"   # codex takes reasoning effort as a config override
  effort_values:
    low: model_reasoning_effort=low
    medium: model_reasoning_effort=medium
    high: model_reasoning_effort=high
