name: Claude Code
detect: claude
launch: claude

context:
  mode: pointer
  file: CLAUDE.md
skills:
  target: .claude/skills
scaffold:
  - .claude/skills
  - .claude/agents
hooks:
  config: .claude/settings.local.json
  install: settings-json
  docs: https://docs.claude.com/en/docs/claude-code/hooks
  events:
    working: UserPromptSubmit
    waiting: Notification
    idle: Stop
heuristics:
  waiting:
    - "(y/n)"
    - "approve"
    - "press enter"
  working:
    - "running command"
    - "reading file"
