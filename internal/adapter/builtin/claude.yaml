name: Claude Code
detect: claude
launch: claude

context:
  mode: pointer
  file: CLAUDE.md
skills:
  target: .claude/skills
scaffold:
  - .claude/skills
  - .claude/agents
hooks:
  config: .claude/settings.local.json
  install: settings-json
  docs: https://docs.claude.com/en/docs/claude-code/hooks
  events:
    working: UserPromptSubmit
    waiting: Notification
    idle: Stop
account:
  config_dir_env: CLAUDE_CONFIG_DIR   # `sloop profile add --config-dir` sets this
  default_dir: ~/.claude              # source to share tooling/history from
  share: [plugins, agents, commands, skills, CLAUDE.md]   # tooling — same across accounts
  share_state: [projects, todos]      # conversation history — opt-in, for cross-account resume
run:
  vendor: anthropic
  default_for: [anthropic]
  model_flag: "--model"   # accepts opus/sonnet/haiku/fable or a full id (claude-opus-4-8)
  models: [opus, sonnet, haiku, fable]
  prompt: positional      # `claude "task"` seeds an interactive session (claude -p exits)
  resume_flag: "--continue"  # `claude --continue` resumes the repo's most recent conversation
# Extra `sloop check` best practices, sourced from Claude Code's own guidance.
# These are the filesystem-detectable ones; behavioral tips (explore→plan→code,
# /clear, verification loops) are intentionally NOT here — they can't be checked
# mechanically and would only produce false gaps.
readiness:
  docs: https://code.claude.com/docs/en/best-practices
  checks:
    - id: subagents
      label: "Subagents folder (.claude/agents) for delegated, isolated tasks"
      kind: dir-exists
      path: .claude/agents
      fix: "sloop init --scaffold"
      optional: true
# No `heuristics:` block: Claude's prompts use the cross-tool defaults (see
# defaultWaitingMarkers/defaultWorkingMarkers in internal/tmux/status.go).
# Precise status comes from the hooks above; heuristics are only the fallback.
# Add a heuristics block here only for phrasing the defaults genuinely miss.
