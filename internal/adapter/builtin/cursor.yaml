name: Cursor CLI
detect: agent
launch: agent

context:
  mode: native
  file: ""
skills:
  target: ""
scaffold:
  - .cursor/rules
hooks:
  config: .cursor/hooks.json
  install: cursor-json
  docs: https://cursor.com/docs/hooks
  notes: hooks.json {version,hooks}; no clean "blocked on user" event, so waiting is left to the pane heuristic
  events:
    working: {event: beforeSubmitPrompt}
    # beforeShellExecution fires on every command, not only when blocked — would
    # mislabel; heuristic handles cursor's approval prompts, so waiting is unset.
    idle: {event: stop}
# Cursor's footer shows the model display name on its own line right above
# the `~/dir · branch` line (e.g. `  Composer 2.5 Fast`); the dir line is the
# anchor that keeps this from matching prose.
heuristics:
  model: '(?m)^ {2}(\S[^·\n]*?) *\n {2}[~/]'
run:
  model_flag: "--model"   # e.g. agent --model gpt-5 (Cursor is multi-vendor; no bare-model home)
  prompt: positional      # `agent "task"` seeds an interactive session (agent -p is print mode)
