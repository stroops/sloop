name: Gemini CLI
detect: gemini
launch: gemini

context:
  mode: pointer
  file: GEMINI.md
skills:
  target: ""
hooks:
  config: .gemini/settings.json
  install: settings-json
  docs: https://geminicli.com/docs/hooks/reference/
  events:
    working: BeforeAgent
    waiting: Notification
    idle: AfterAgent
run:
  vendor: google
  default_for: [google]
  model_flag: "--model"
