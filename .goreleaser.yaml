# .goreleaser.yaml
version: 2

builds:
  - id: sloop
    main: ./cmd/sloop
    binary: sloop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: sloop
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

  # - id: sloopd
  #   builds: [sloopd]
  #   name_template: "sloopd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: sloop
    ids:
      - sloop
    repository:
      owner: stroops
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://stroops.tech"
    description: "Sloop - the local-first control layer for your AI coding CLIs."
    license: "MIT"
    install: |
      bin.install "sloop"
    test: |
      system "#{bin}/sloop", "version"

scoops:
  - name: sloop
    repository:
      owner: stroops
      name: scoop-bucket
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://stroops.tech"
    description: "Sloop - the local-first control layer for your AI coding CLIs."
    license: "MIT"
