name: Release

on:
  push:
    tags:
      - 'v*' # Run only when a tag matching v* is pushed (e.g., v0.1.0)

permissions:
  contents: write # Required for Goreleaser to create GitHub Releases

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Goreleaser to generate changelog from git history
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
